<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voice Agent Dashboard</title>
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
</head>
<body>
<div class="shell">
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-icon">🎙️</span>
      <div>
        <div class="brand-name">Voice Agent</div>
        <div class="brand-sub">dashboard</div>
      </div>
    </div>
    <div class="agent-status" id="agent-status">
      <span class="dot"></span><span class="status-text">checking…</span>
    </div>
    <div class="nav-links">
      <a href="#/overview" data-view="overview"><span class="nav-ico">◧</span>Overview</a>
      <a href="#/notes" data-view="notes"><span class="nav-ico">✎</span>Notes</a>
      <a href="#/config" data-view="config"><span class="nav-ico">⚙</span>Config</a>
      <a href="#/conversation" data-view="conversation"><span class="nav-ico">💬</span>Conversation</a>
      <a href="#/memory" data-view="memory"><span class="nav-ico">◔</span>Memory</a>
      <a href="#/knowledge" data-view="knowledge"><span class="nav-ico">📚</span>Knowledge</a>
      <a href="#/discord" data-view="discord"><span class="nav-ico">📈</span>Discord</a>
      <a href="#/logs" data-view="logs"><span class="nav-ico">≣</span>Logs</a>
    </div>
    <div class="sidebar-foot">local · 127.0.0.1</div>
  </nav>
  <main class="main" id="main"></main>
</div>
<script src="/app.js"></script>
</body>
</html>
